name: Visual Parity

on:
  workflow_dispatch:

jobs:
  storybook-diff:
    name: Storybook Diff
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Capture upstream web references
        run: scripts/capture-web-references.sh

      - name: Capture native chart screenshots
        run: scripts/capture-storybook.sh --chart-only

      - name: Diff screenshots
        env:
          VISUAL_PARITY_EXCLUSIONS: line-show-value-windows,line-rounded-windows,line-text-windows,candle-mode-controls,multi-basic,multi-light,multi-compact,multi-two-series
        run: scripts/diff-storybook.sh --exclude-scenarios "$VISUAL_PARITY_EXCLUSIONS" --fail-changed-pct 5 --fail-rms 12

      - name: Upload parity artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-parity
          path: |
            Media/web-reference
            Media/storybook-chart-only
            Media/storybook-diff
