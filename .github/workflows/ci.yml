name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-package:
    name: Swift Package
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Test package
        run: swift test

      - name: Build package for release
        run: swift build -c release

      - name: Build package for macOS
        run: xcodebuild -scheme Liveline -destination 'generic/platform=macOS' build

  ios-demo:
    name: iOS Demo
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate demo project
        run: xcodegen generate
        working-directory: Examples/LivelineDemo

      - name: Build demo app
        run: xcodebuild -project Examples/LivelineDemo/LivelineDemo.xcodeproj -scheme LivelineDemo -destination 'generic/platform=iOS Simulator' build
