name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-package:
    name: Swift Package
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Validate generated project metadata
        run: python3 scripts/storybook_manifest.py validate

      - name: Test package
        run: swift test

      - name: Build package for release
        run: swift build -c release

      - name: Check public API compatibility
        run: |
          BASELINE_TAG=$(git describe --tags --abbrev=0 --match '[0-9]*')
          swift package diagnose-api-breaking-changes "$BASELINE_TAG" --products Liveline

  apple-platforms:
    name: Apple Platform (${{ matrix.platform }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - iOS
          - macOS
          - tvOS
          - watchOS
          - visionOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package for ${{ matrix.platform }}
        run: xcodebuild -scheme Liveline -destination "generic/platform=${{ matrix.platform }}" build

  ios-demo:
    name: iOS Demo
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned XcodeGen
        run: |
          scripts/install-xcodegen.sh "$RUNNER_TEMP/xcodegen"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Generate demo project
        run: xcodegen generate
        working-directory: Examples/LivelineDemo

      - name: Build demo app
        run: xcodebuild -project Examples/LivelineDemo/LivelineDemo.xcodeproj -scheme LivelineDemo -destination 'generic/platform=iOS Simulator' build
